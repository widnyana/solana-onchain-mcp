# .goreleaser.yml
version: 2

before:
  hooks: []

after:
  - cmd: "cargo publish {{ if .IsSnapshot }}--dry-run{{ end }} --quiet --no-verify"

# We skip GoReleaser's build phase entirely.
# Binaries are pre-built by the GitHub Actions matrix and placed in dist/.
builds:
  - skip: true

archives:
  - id: default
    name_template: "solana-onchain-mcp-{{ .Os }}-{{ .Arch }}"
    files:
      - none*  # only include the binary

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  github:
    owner: widnyana
    name: solana-onchain-mcp
  name_template: "{{ .Tag }}"
  draft: false
  prerelease: auto

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
