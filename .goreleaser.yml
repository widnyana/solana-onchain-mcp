# .goreleaser.yml
version: 2

before:
  hooks: []

# We use pre-built binaries from CI, configured with the prebuilt builder
builds:
  - builder: prebuilt
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    goamd64:
      - v1
    prebuilt:
      path: prebuilt/{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}{{ with .Amd64 }}_{{ . }}{{ end }}/{{ .ProjectName }}
    binary: {{ .ProjectName }}

archives:
  - id: default
    name_template: "solana-onchain-mcp-{{ .Os }}-{{ .Arch }}"
    files:
      - none*  # only include the binary

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  github:
    owner: widnyana
    name: solana-onchain-mcp
  name_template: "{{ .Tag }}"
  prerelease: auto

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
