name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      draft:
        description: "Create as draft release"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write
  actions: read
  attestations: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  # Step 1: Verify tag version matches Cargo.toml
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: startsWith(github.ref, 'refs/tags/v')
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Extract version from tag
        id: extract
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - name: Verify tag matches Cargo.toml
        run: |
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | cut -d '"' -f2)
          TAG_VERSION="${{ steps.extract.outputs.version }}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: Cargo.toml=${CARGO_VERSION}, tag=${TAG_VERSION}"
            echo "Bump Cargo.toml version and merge to main before tagging."
            exit 1
          fi

  # Step 2: Build binaries per target (matrix)
  build:
    needs: [verify]
    if: always() && (needs.verify.result == 'success' || needs.verify.result == 'skipped')
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            cc: aarch64-linux-gnu-gcc
          - target: x86_64-apple-darwin
            runner: macos-15-intel
          - target: aarch64-apple-darwin
            runner: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install musl tools
        if: matrix.runner == 'ubuntu-latest'
        run: sudo apt-get install -y musl-tools binutils-aarch64-linux-gnu
      - name: Install zig for aarch64 musl cross-compilation
        if: matrix.cc != ''
        uses: mlugg/setup-zig@v2.2.1
      - name: Install cargo-zigbuild
        if: matrix.cc != ''
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild
      - name: Build release binary (native musl)
        if: matrix.cc == ''
        run: cargo build --release --target ${{ matrix.target }}
        env:
          RUSTC_WRAPPER: ""
      - name: Build release binary (aarch64 musl via zigbuild)
        if: matrix.cc != ''
        run: cargo zigbuild --release --target ${{ matrix.target }}
        env:
          RUSTC_WRAPPER: ""
      - name: Strip binary
        run: |
          STRIP="strip"
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            STRIP="aarch64-linux-gnu-strip"
          fi
          $STRIP target/${{ matrix.target }}/release/solana-onchain-mcp
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/solana-onchain-mcp

  # Step 3: Package binaries and create GitHub Release
  package:
    needs: [verify, build]
    if: always() && needs.build.result == 'success' && (needs.verify.result == 'success' || needs.verify.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: binary-*
          merge-multiple: false
      - name: Package binaries into tar.gz archives
        run: |
          # Create output directory
          mkdir -p dist

          # Package each binary
          declare -A targets=(
            ["binary-x86_64-unknown-linux-musl"]="linux-amd64"
            ["binary-aarch64-unknown-linux-musl"]="linux-arm64"
            ["binary-x86_64-apple-darwin"]="darwin-amd64"
            ["binary-aarch64-apple-darwin"]="darwin-arm64"
          )

          for artifact_dir in "${!targets[@]}"; do
            target="${targets[$artifact_dir]}"
            archive_name="solana-onchain-mcp-${target}.tar.gz"
            echo "Packaging $archive_name from $artifact_dir"
            tar -czf "dist/${archive_name}" -C "artifacts/${artifact_dir}" solana-onchain-mcp
          done

          # Generate checksums
          cd dist
          sha256sum *.tar.gz > checksums.txt
          cd ..
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRAFT: ${{ github.event.inputs.draft == 'true' && '--draft' || '' }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"

          # Create release with assets
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Release $TAG" \
            $DRAFT \
            dist/*.tar.gz \
            dist/checksums.txt

  # Step 4: Publish to crates.io
  publish-crates:
    needs: [package]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: release
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATESIO_TOKEN }}
          RUSTC_WRAPPER: ""
        run: cargo publish
