name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      draft:
        description: "Create as draft release"
        required: false
        default: true
        type: boolean
      skip_publish:
        description: "Skip crates.io publishing"
        required: false
        default: true
        type: boolean

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install jq
        run: sudo apt-get install -y jq
      - name: Extract version
        id: extract
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            VERSION=$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[0].version')
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
          fi
      - name: Verify version matches Cargo.toml
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          CARGO_VERSION=$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[0].version')
          TAG_VERSION="${{ steps.extract.outputs.version }}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: Cargo.toml has $CARGO_VERSION, tag has $TAG_VERSION"
            exit 1
          fi

  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Clippy
        run: cargo clippy -- -D warnings

  unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: dtolnay/rust-toolchain@stable
      - name: Run unit tests
        run: cargo test --verbose

  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: dtolnay/rust-toolchain@stable
      - name: Run integration tests
        run: cargo test --verbose -- --ignored
        env:
          SOLANA_NETWORK: devnet

  build:
    needs: [verify]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: true
          - target: x86_64-apple-darwin
            runner: macos-13
            use_cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            use_cross: false
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: mozilla-actions/sccache-action@v0.0.9
        if: "!matrix.use_cross"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build release
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        env:
          OPENSSL_STATIC: 1
          # Disable sccache for cross builds - not available in container
          RUSTC_WRAPPER: ${{ matrix.use_cross == true && '' || 'sccache' }}

      - name: Strip binary
        if: "!matrix.use_cross"
        run: strip target/${{ matrix.target }}/release/solana-onchain-mcp

      - name: Rename binary
        run: |
          BIN_NAME="solana-onchain-mcp-${{ matrix.target }}"
          mv target/${{ matrix.target }}/release/solana-onchain-mcp "$BIN_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: solana-onchain-mcp-${{ matrix.target }}

  publish-crates:
    needs: [verify]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: release
    if: ${{ startsWith(github.ref, 'refs/tags/') || !inputs.skip_publish }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATESIO_TOKEN }}
        run: cargo publish

  github-release:
    needs: [build, publish-crates, fmt, clippy, unit-test, integration-test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: false

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find binaries -type f -exec cp {} release-assets/ \;

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum * > checksums.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: ${{ !startsWith(github.ref, 'refs/tags/') && inputs.draft }}
          prerelease: ${{ contains(needs.verify.outputs.version, '-') }}
          tag_name: v${{ needs.verify.outputs.version }}
