name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

permissions:
  contents: read

jobs:
  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Clippy
        run: cargo clippy -- -D warnings

  unit-test:
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: dtolnay/rust-toolchain@stable
      - name: Run unit tests
        run: cargo test --verbose

  integration-test:
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: dtolnay/rust-toolchain@stable
      - name: Run integration tests
        run: cargo test --verbose -- --ignored
        env:
          SOLANA_NETWORK: devnet

  report:
    if: always() && github.event_name == 'pull_request'
    needs: [fmt, clippy, unit-test, integration-test]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const jobs = {
              fmt: '${{ needs.fmt.result }}',
              clippy: '${{ needs.clippy.result }}',
              'unit-test': '${{ needs.unit-test.result }}',
              'integration-test': '${{ needs.integration-test.result }}'
            };

            const allPassed = Object.values(jobs).every(v => v === 'success');
            const failedJobs = Object.entries(jobs)
              .filter(([_, result]) => result !== 'success')
              .map(([name, result]) => `\`${name}\`: ${result}`)
              .join('\n');

            const statusEmoji = allPassed ? '✅' : '❌';
            const statusText = allPassed
              ? 'All CI checks passed!'
              : 'Some CI checks failed.';

            const body = `${statusEmoji} **CI Test Report**\n\n${statusText}\n\n` +
              (failedJobs ? `**Failed jobs:**\n${failedJobs}` : '**All jobs passed.**') +
              '\n\n<!-- ci-report -->';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('<!-- ci-report -->')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
