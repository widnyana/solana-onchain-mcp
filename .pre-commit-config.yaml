repos:
  - repo: https://github.com/AndrejOrsula/pre-commit-cargo
    rev: 0.5.0
    hooks:
      - id: cargo-check
        args: ["--all-targets", "--all-features"]

  - repo: local
    hooks:
      - id: make-fmt
        name: Run Makefile fmt
        entry: make fmt
        language: system
        files: \.(rs)$
        pass_filenames: false

      - id: make-clippy
        name: Run Makefile clippy
        entry: make clippy
        language: system
        files: \.(rs)$
        pass_filenames: false
